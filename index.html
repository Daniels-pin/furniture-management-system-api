<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Furniture App</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 15px;
            margin-top: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
        }

        input {
            padding: 10px;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>🪑 Furniture Orders</h1>

    <div class="container">
        <div class="card">
                <h3>Login</h3>

                <input id="username" placeholder="Username">
                <input id="password" type="password" placeholder="Password">

                <button onclick="login()">Login</button>
                 </div>

        <!-- CREATE ORDER -->
        <div class="card">
            <h3>Create Order</h3>
            <h4>Customer Info</h4>

            <input id="customer_name" placeholder="Customer Name">
            <input id="customer_phone" placeholder="Phone">
            <input id="customer_address" placeholder="Address">
            <input id="due_date" type="datetime-local">
            
            <h4>Item</h4>
            <div id="items-container"></div>

            <button onclick="addItem()">+ Add Item</button>
                        
            <button onclick="createOrder()">Create Order</button>
        </div>

        <!--edit order-->
        <div class="card" id="edit-section" style="display:none;">
            <h3>Edit Order</h3>

            <input id="edit_customer_name" placeholder="Customer Name">
            <input id="edit_customer_phone" placeholder="Phone">
            <input id="edit_customer_address" placeholder="Address">
            <input id="edit_due_date" type="datetime-local">

            <div id="edit-items-container"></div>

            <button onclick="updateOrder()">Save Changes</button>
        </div>
        <!-- LOAD ORDERS -->
        <div class="card">
            <h3>All Orders</h3>
            <button onclick="getOrders()">Load Orders</button>

            <div id="orders"></div>
        </div>

        <!--reminders-->
        <div class="card">
        <h3>Upcoming Orders (Reminders)</h3>
        <button onclick="getReminders()">Load Reminders</button>

        <div id="reminders"></div>
</div>

    </div>

<script>
let TOKEN = "";
const API_URL = "http://127.0.0.1:8000";
let editingOrderId = null;
function addItem() {
    const container = document.getElementById("items-container");

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <input class="item_name" placeholder="Item Name">
        <input class="description" placeholder="Description">
        <input class="quantity" type="number" placeholder="Quantity">
        <button onclick="this.parentElement.remove()">Remove</button>
    `;

    container.appendChild(div);
}

async function getOrders() {
    const res = await fetch(`${API_URL}/orders`, {
        headers: {
            "Authorization": `Bearer ${TOKEN}`
        }
    });

    if (!res.ok) {
        alert("Failed to load orders");
        console.log(await res.text());
        return;
    }

    const data = await res.json();

    const container = document.getElementById("orders");
    container.innerHTML = "";

    data.forEach(order => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <b>Order ID:</b> ${order.id}<br>
            <b>Status:</b> 
            <select onchange="updateStatus(${order.id}, this.value)">
                ${["pending", "in_progress", "completed", "delivered"].map(s => `
                    <option value="${s}" ${s === order.status ? "selected" : ""}>
                        ${s}
                    </option>
                `).join("")}
            </select>
            <br>
            <b>Due Date:</b> ${order.due_date}<br><br>

            <b>Items:</b><br>
            ${order.items.map(item => `
                - ${item.item_name} (${item.quantity})<br>
            `).join("")} 

            <br>
            <button onclick="deleteOrder(${order.id})">Delete</button>
            <button onclick="editOrder(${order.id})">Edit</button>
        `;
        container.appendChild(div);
    });
    console.log(data);
}

async function createOrder() {
    // Customer fields
    const customer_name = document.getElementById("customer_name").value;
    const customer_phone = document.getElementById("customer_phone").value;
    const customer_address = document.getElementById("customer_address").value;

    // Order fields
    const due_date = document.getElementById("due_date").value;

    // Get items
    const itemDivs = document.querySelectorAll("#items-container .card");

    let items = [];

    itemDivs.forEach(div => {
        const item_name = div.querySelector(".item_name").value;
        const description = div.querySelector(".description").value;
        const quantity = Number(div.querySelector(".quantity").value);

        if (item_name && quantity) {
            items.push({
                item_name: item_name,
                description: description || null,
                quantity: quantity
            });
        }
    });

    // Validation
    if (!customer_name || !customer_phone || !customer_address) {
        alert("Fill all customer fields");
        return;
    }

    if (items.length === 0) {
        alert("Add at least one item!");
        return;
    }

    // Send request
    const res = await fetch(`${API_URL}/orders`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${TOKEN}`
        },
        body: JSON.stringify({
            customer: {
                name: customer_name,
                phone: customer_phone,
                address: customer_address
            },
            due_date: due_date || null,
            items: items
        })
    });

    const data = await res.json();

    if (res.ok) {
        alert("Order created!");
        getOrders();
    } else {
        alert("Error creating order");
        console.log(data);
    }
}

async function deleteOrder(id) {
    const res = await fetch(`${API_URL}/orders/${id}`, {
        method: "DELETE",
        headers: {
            "Authorization": `Bearer ${TOKEN}`
        }
    });

    if (res.ok) {
        alert("Deleted!");
        getOrders();
    } else {
        alert("Delete failed");
        console.log(await res.text());
    }
}

async function login() {
    const email = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch("http://127.0.0.1:8000/auth/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email,
            password: password
        })
    });

    const data = await res.json();

    if (res.ok) {
        TOKEN = data.access_token;
        alert("Login successful!");
        console.log("TOKEN:", TOKEN);
    } else {
        alert("Login failed");
        console.log(data);
    }
}

async function updateStatus(orderId, newStatus) {
    const res = await fetch(`${API_URL}/orders/${orderId}?status=${newStatus}`, {
        method: "PUT",
        headers: {
            "Authorization": `Bearer ${TOKEN}`
        }
    });

    const data = await res.json();

    if (res.ok) {
        alert("Status updated!");
        getOrders(); // refresh list
    } else {
        alert("Failed to update status");
        console.log(data);
    }
}
async function getReminders() {
    const container = document.getElementById("reminders");
    container.innerHTML = "Loading reminders...";

    const res = await fetch(`${API_URL}/orders/reminders`, {
        headers: {
            "Authorization": `Bearer ${TOKEN}`
        }
    });

    if (!res.ok) {
        container.innerHTML = "Failed to load reminders";
        console.log(await res.text());
        return;
    }

    const data = await res.json();

    if (data.length === 0) {
        container.innerHTML = "No upcoming orders 🎉";
        return;
    }

    container.innerHTML = "";

    data.forEach(order => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <b>Order ID:</b> ${order.id}<br>
            <b>Status:</b> ${order.status}<br>
            <b>Due Date:</b> ${order.due_date}<br>
            <b>Days Remaining:</b> ${order.days_remaining} days
        `;

        container.appendChild(div);
    });
}

async function editOrder(orderId) {
    editingOrderId = orderId;

    const res = await fetch(`${API_URL}/orders/${orderId}`, {
        headers: {
            "Authorization": `Bearer ${TOKEN}`
        }
    });

    const order = await res.json();

    // Show section
    document.getElementById("edit-section").style.display = "block";

    // Fill customer
    document.getElementById("edit_customer_name").value = order.customer?.name || "";
    document.getElementById("edit_customer_phone").value = order.customer?.phone || "";
    document.getElementById("edit_customer_address").value = order.customer?.address || "";
    document.getElementById("edit_due_date").value = order.due_date || "";

    // Fill items
    const container = document.getElementById("edit-items-container");
    container.innerHTML = "";

    order.items.forEach(item => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <input class="item_name" value="${item.item_name}">
            <input class="description" value="${item.description || ""}">
            <input class="quantity" type="number" value="${item.quantity}">
            <button onclick="this.parentElement.remove()">Remove</button>
        `;

        container.appendChild(div);
    });
}

</script>

</body>
</html>
